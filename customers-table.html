<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers table | Untitled UI</title>
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/app.css">
</head>

<body>
    <h1 class="section-title">customers table</h1>
    <section class="ct">
        <div class="customers-table-card">
            <header class="card-header">
                <h1 class="title">customers</h1>
                <p class="sub-heading">These companies have purchased in the last 12 months.</p>
            </header>
            <table class="customers-table">
                <tr>
                    <th>company</th>
                    <th>status</th>
                    <th>about</th>
                    <th>users</th>
                    <th>License use</th>
                    <th><!----- empty for the more button -----></th>
                </tr>
                <tr>
                    <td>
                        <div class="icon">
                            <div class="catalog-icon"></div>
                        </div>
                        <div class="company-name"></div>
                        <div class="company-email"></div>
                    </td>
                    <td>
                        <div class="status-customer"></div>
                    </td>
                    <td>
                        <div class="about">
                            <div class="title">content curating app</div>
                            <div class="sub-title">Brings all your news into one place</div>
                        </div>
                    </td>
                    <td>
                        <ul class="users">
                            <li>
                                <a href="#"><img src="img/blog/olivia-rhye.png" alt=""></a>
                            </li>
                        </ul>
                    </td>
                </tr>
            </table>
        </div>
    </section>
</body>

</html>
