<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop down men | Untitled UI</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <button class="md-secondary">Account</button>
    <div class="drop-down-menu">
        <div class="profile">
        <header>
            <div class="avatar">
                <img src="img/blog/olivia-rhye.png" alt="">
            </div>
            <div class="user-info">
                <div class="user-name">olivia rhye</div>
                <div class="email">olivia@untitledui.com</div>
            </div>
        </header>
        <div class="card-body">
            <ul>
                <li>
                    <div class="icon-xs">
                        <div class="change-log-icon"></div>
                    </div>
                    <a href="#">change log</a>
                </li>
                <li>
                    <div class="icon-xs">
                        <div class="invite-icon"></div>
                    </div>
                    <a href="#">invite team members</a>
                </li>
                <li>
                    <div class="icon-xs">
                        <div class="api-icon"></div>
                    </div>
                    <a href="#">API documenataion</a>
                </li>
            </ul>
            <ul>
                <li>
                    <div class="icon-xs">
                        <div class="settings-icon"></div>
                    </div>
                    <a href="#">settings</a>
                </li>
                <li>
                    <div class="icon-xs">
                        <div class="email-icon"></div>
                    </div>
                    <a href="#">email</a>
                </li>
                <li>
                    <div class="icon-xs">
                        <div class="slack-icon"></div>
                    </div>
                    <a href="#">chat with us</a>
                </li>
            </ul>
            <ul>
                <li>
                    <div class="icon-xs">
                        <div class="user-icon"></div>
                    </div>
                    <a href="#">blocked users</a>
                </li>
                <li>
                    <div class="icon-xs">
                        <div class="support-icon"></div>
                    </div>
                    <a href="#">contact support</a>
                </li>
                <li>
                    <div class="icon-xs">
                        <div class="team-icon"></div>
                    </div>
                    <a href="#">invite your team</a>
                </li>
            </ul>
        </div>
        <div class="card-footer">
            <ul class="last">
                <li>
                    <div class="icon-xs">
                        <div class="logout-icon"></div>
                    </div>
                    <a href="#">log out</a>
                </li>
            </ul>
        </div>
        </div>
    </div>
    <script src="js/app.js" type="module"></script>
</body>
</html>
