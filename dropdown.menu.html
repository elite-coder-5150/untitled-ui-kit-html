<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop down men | Untitled UI</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <button class="mg-secondary">Account</button>
    <div class="dropdown-menu">
        <header>
            <div class="profile">
                <div class="avatar-profile">
                    <img src="img/drop-down/olivia-rhye.png" alt="">
                </div>
                <div class="username">olivia rhye</div>
                <div class="email">olivia@untitledui.com</div>
            </div>
        </header>
        <div class="system">
            <ul>
                <li>
                    <div class="icon">
                        <div class="user-icon"></div>
                    </div>
                    <a href="#">view profile</a>
                </li>
                
                <li>
                    <div class="icon">
                        <div class="settings-icon"></div>
                    </div>
                    <a href="#">settings</a>
                </li>

                <li>
                    <div class="icon">
                        <div class="lightning-bolt-icon"></div>
                    </div>
                    <a href="#">keyboard shortcuts</a>
                </li>
            </ul>
        </div>

        <div class="team">
            <ul>
                <li>
                    <div class="icon">
                        <div class="email-icon"></div>
                    </div>
                    <a href="#">company profile</a>
                </li>

                <li>
                    <div class="icon">
                        <div class="team-icon"></div>
                    </div>
                    <a href="#">Team</a>
                </li>

                <li>
                    <div class="icon">
                        <div class="invite-icon"></div>
                    </div>
                    <a href="#">Invite members</a>
                </li>
            </ul>
        </div>
        
        <div class="app">
            <ul>
                <li>
                    <div class="icon">
                        <div class="chagen-log-icon"></div>
                    </div>
                    <a href="#">"change log"</a>
                </li>

                <li>
                    <div class="icon">
                        <div class="slack-icon"></div>
                    </div>
                    <a href="#">slack community</a>
                </li>

                <li>
                    <div class="icon">
                        <div class="support-icon"></div>
                    </div>
                    <a href="#">support</a>
                </li>

                <li>
                    <div class="icon">
                        <div class="api-icon"></div>
                    </div>
                    <a href="#">API Documetation </a>
                </li>
            </ul>
        </div>
        
        <footer>
            <ul>
                <li>
                    <div class="icon">
                        <div class="logout-icon"></div>
                    </div>
                </li>
            </ul>
        </footer>
    </div>
</body>
</html>
