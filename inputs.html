<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs | Untitled UI</title>
    <link rel="icon" href="img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="info">
        <h1 class="page-title">Input components</h1>
        <p class="desc">here is a list of all the input variants</p>
    </div>
    <div class="inputs">
        <div class="container">
            <div class="row">

                <div class="input-bg">
                    <input type="text" placeholder="darrellparkhouse@untitled.com">
                    <div class="icon">
                        <div class="info-icon"></div>
                    </div>
                </div>

                <div class="input-bg">
                    <div class="icon">
                        <div class="email-icon"></div>
                    </div>
                    <input type="text" placeholder="darrell@untitledui.com">
                    <div class="icon">
                        <div class="info-icon"></div>
                    </div>
                </div>
                <div class="input-bg">
                    <div class="icon">
                        <div class="master-card-icon"></div>
                    </div>
                    <input type="text" placeholder="Card number">
                    <div class="icon">
                        <div class="info-icon"></div>
                    </div>
                </div>
               
            </div> <!----- end of .row ----->
            <div class="row">
                <div class="input-bg">
                    <span>http://</span>
                    <input type="text" placeholder="untitled.com">
                    <div class="icon">
                        <div class="info-icon"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
