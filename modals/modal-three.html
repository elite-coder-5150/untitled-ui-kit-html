<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modal three | Untitles UI</title>
    <link rel="icon" type="image/x-icon" href="../img/favicon.png">
    <link rel="stylesheet" href="../css/app.css">

</head>

<body>
    <div class="overlay">
        <div class="modal-three">
            <header class="modal-header">
                <div class="left">
                    <h1 class="modal-title">complete your profile</h1>
                    <p class="sub-heading">
                        choose a username and write a brief intro
                    </p>
                </div>
                <div class="right">
                    <div class="icon">
                        <div class="close-modal-icon"></div>
                    </div>
                </div>
            </header>
            <div class="modal-body">
                <form class="upload-form">
                    <div class="upload">
                        <div class="left">
                            <div class="profile-avatar">

                            </div>
                        </div>
                        <div class="right"></div>
                    </div> <!----- end of upload ----->

                    <div class="username-container">
                        <div class="input-bg">
                            <span class="url">untitled.com/</span>
                            <input type="text" placeholder="@darrellparkhousse">
                        </div>
                    </div>

                    <div class="intro-container">
                        <label for="intro">Introduction*</label>
                        <textarea placeholder="Write a brief introduction to show on your profile"></textarea>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
