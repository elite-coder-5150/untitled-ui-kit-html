<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal two | Untitled UI</title>
    <link rel="icon" type="image/x-icon" href="../img/favicon.png">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
    <div class="overlay">
        <div class="modal-two">
            <header class="modal-header">
                <div class="icon">
                    <div class="feature-icon"></div>
                </div>
                <div class="icon">
                    <div class="close-modal-icon"></div>
                </div>
               
            </header>
            <h1 class="modal-title">please enter your password</h1>
            <p class="supportive-text">enter your password to make this change</p>
            <div class="modal-body">
                <form class="enter-password-form">
                    <div class="email-input-container">
                        <label for="email">Email</label>
                        <input type="text" placeholder="darrell@untitled.com">
                    </div>
                    <div class="password-input-container">
                        <label for="password">Password</label>
                        <input type="password">
                    </div>

                    <div class="btn-group                                                             ">
                        <button class="md-secondary">Cancel</button>
                        <button class="md-primary">Verify</button>
                    </div>
                </form>
            </div>
        </div>
    </div>    
</body>
</html>
