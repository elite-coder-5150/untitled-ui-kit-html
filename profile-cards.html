<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Cards | Untitled UI</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <section class="profile-one">
        <!----- 
            create a profile with the following fields
            profile-avatar
            username
            position
            company name
            
            education
                one or two items
            
            work history.
            
            list of four social networks, more can be added at a later time.
                facebook, twitter, youtube, github.
        ----->
        <div class="profile-card">
            <header class="card-header">
                <div class="avatar">
                    <img src="#" alt="">
                </div>
                <div class="info">
                    <div class="user-name">test case</div>
                    <div class="position">test position</div>
                    <div class="company-name"></div>
                </div>
            </header>
            <div class="card-body">
                <div class="row">
                    <div class="col">
                        <div class="icon">
                            <div class="twitter-icon"></div>
                        </div>
                        <div class="number">3.4K</div>
                        <div class="text">followers</div>
                    </div>
                    <div class="col">
                        <div class="icon">
                            <div class="facebook-icon"></div>
                        </div>
                        <div class="number">3.7K</div>
                        <div class="text">friends</div>
                    </div>
                    <div class="col">
                        <div class="icon">
                            <div class="github-icon"></div>
                        </div>
                        <div class="number">321</div>
                        <div class="text">repos</div>
                    </div>
                    <div class="col">
                        <div class="icon">
                            <div class="youtube-icon"></div>
                        </div>
                        <div class="number">53K</div>
                        <div class="text">subscribers</div>
                    </div>
                </div>
            </div>

            <footer class="card-footer">
                <div class="btn-group">
                    <button class="md-secondary">email me</button>
                    <button class="md-primary">hire me</button>
                </div>
            </footer>
        </div>
    </section>
    <section class="profile-two">
        <!----- use the original card as a starting point ----->
    </section>
</body>
</html>
