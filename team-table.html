<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Table | Untitled UI</title>
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div class="comtainer">
        <div class="table-card">
            <header class="table-card-header">
                <div class="title">team members</div>
                <div class="primary-badge">100 users</div>
            </header>
            <table class="team-members">
                <thead>
                    <tr>
                        <th>
                            <input type="checkbox"> name
                        </th>
                        <th>
                            status 
                            <div class="toggle-icon"></div>
                        </th>
                        
                        <th>
                            role 
                            <div class="icon-sm">
                                <div class="info-icon"></div>
                            </div>
                        </th>

                        <th>email address</th>
                        <th>teams</th>
                        <th><!----- empty -----></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="input" type="checkbox">
                            <div class="profile">
                                <div class="avaatar">
                                    <!----- use the img tag ----->
                                </div>
                                <div class="user-name">olivia rhye</div>
                                <div class="email">oliviarhye@untitledui.com</div>
                            </div>
                        </td>
                        <td>
                            <div class="active-badge">
                                <div class="dot"></div> active
                            </div>
                        </td>
                        <td>product designer</td>
                        <td>olivia@untitleduui.com</td>
                        <td>
                            <ul class="tags">
                                <li class="tag design"><a href="#">design</a></li>
                                <li class="tag design"><a href="#">oriduct</a></li>
                                <li class="tag design"><a href="#">marketing</a></li>
                            </ul>
                        </td>
                        <td>
                            <ul class="utility">
                                <li>
                                    <div class="icon">
                                        <div class="trash-icon"></div>
                                    </div>
                                </li>

                                <li>
                                    <div class="icon">
                                        <div class="edit-icon"></div>
                                    </div>
                                </li>
                            </ul>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
